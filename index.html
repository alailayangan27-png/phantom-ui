<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:#0d0d0f;
  color:white;
}

/* HEADER */
.header {
  padding:30px 20px 20px;
  background:linear-gradient(180deg,#1a3f34,#0d0d0f);
}

.wallet {
  font-size:13px;
  opacity:0.6;
}

.balance {
  font-size:42px;
  font-weight:600;
  margin-top:10px;
}

/* BUTTONS */
.actions {
  display:flex;
  justify-content:space-around;
  padding:20px;
}

.action {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.circle {
  width:55px;
  height:55px;
  border-radius:50%;
  background:linear-gradient(135deg,#5f2eea,#8a63ff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

/* TOKEN LIST */
.tokens {
  padding:10px;
}

.token {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1a1a1d;
  margin:8px 12px;
  padding:14px;
  border-radius:16px;
}

.token-left {
  display:flex;
  align-items:center;
  gap:12px;
}

.name {
  font-size:15px;
}

.amount {
  font-size:13px;
  opacity:0.6;
}

/* SOL LOGO SVG WRAP */
.sol-logo {
  width:35px;
  height:35px;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:#1a1a1d;
  display:flex;
  justify-content:space-around;
  padding:12px 0;
  border-top:1px solid #222;
}
</style>
</head>

<body>

<div class="header">
  <div class="wallet">Main Wallet</div>
  <div class="balance">$0.00</div>
</div>

<div class="actions">
  <div class="action">
    <div class="circle">⬆️</div>
    <div>Send</div>
  </div>
  <div class="action">
    <div class="circle">⬇️</div>
    <div>Receive</div>
  </div>
  <div class="action">
    <div class="circle">💱</div>
    <div>Swap</div>
  </div>
  <div class="action">
    <div class="circle">🛒</div>
    <div>Buy</div>
  </div>
</div>

<div class="tokens">

  <!-- SOL TOKEN -->
  <div class="token">
    <div class="token-left">

      <!-- SOL LOGO -->
      <svg class="sol-logo" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00FFA3"/>
            <stop offset="100%" stop-color="#DC1FFF"/>
          </linearGradient>
        </defs>

        <rect x="15" y="20" width="70" height="12" rx="6" fill="url(#g)" transform="skewY(-10)"/>
        <rect x="15" y="44" width="70" height="12" rx="6" fill="url(#g)" transform="skewY(-10)"/>
        <rect x="15" y="68" width="70" height="12" rx="6" fill="url(#g)" transform="skewY(-10)"/>
      </svg>

      <div>
        <div class="name">Solana</div>
        <div class="amount">0.00 SOL</div>
      </div>
    </div>

    <div>$0.00</div>
  </div>

</div>

<div class="nav">
  <div>🏠</div>
  <div>📊</div>
  <div>🔄</div>
  <div>🌐</div>
  <div>⚙️</div>
</div>

</body>
</html>
