<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0d0d0f;
  color:white;
}

.header{
  padding:30px;
  background:linear-gradient(180deg,#1e4638,#0d0d0f);
  text-align:center;
}

.balance{
  font-size:40px;
}

.actions{
  display:flex;
  justify-content:space-around;
  margin-top:20px;
}

.btn{
  background:#6c4cff;
  padding:12px 20px;
  border-radius:20px;
}

.token{
  margin:10px;
  padding:15px;
  border-radius:16px;
  background:#1a1a1d;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="header">
  <div onclick="connect()">Connect</div>
  <div class="balance">$0.00</div>

  <div class="actions">
    <div class="btn" onclick="swap()">Swap</div>
    <div class="btn" onclick="send()">Send</div>
  </div>
</div>

<div id="tokens"></div>

<script>
const { Connection, PublicKey, Transaction } = solanaWeb3;

const connection = new Connection("https://api.mainnet-beta.solana.com");

let wallet = null;
let prices = {};

// 🔥 PRICE API
async function loadPrices(){
  const res = await fetch(
    "https://api.coingecko.com/api/v3/simple/price?ids=solana,ethereum&vs_currencies=usd"
  );
  prices = await res.json();
}

// CONNECT
async function connect(){
  const res = await window.solana.connect();
  wallet = res.publicKey;

  await loadPrices();
  loadAll();
}

// LOAD
async function loadAll(){
  const lamports = await connection.getBalance(wallet);
  const sol = lamports / 1e9;

  const usd = sol * prices.solana.usd;

  document.querySelector(".balance").innerText =
    "$" + usd.toFixed(2);

  render("Solana", sol, usd);
}

// RENDER
function render(name, amount, usd){
  document.getElementById("tokens").innerHTML = `
    <div class="token">
      <div>${name}</div>
      <div>$${usd.toFixed(2)}</div>
    </div>`;
}

// 🔥 SWAP (JUPITER)
async function swap(){
  if(!wallet) return alert("connect first");

  const amount = prompt("SOL amount:");

  // 1️⃣ GET QUOTE
  const quote = await fetch(
    `https://quote-api.jup.ag/v6/quote?inputMint=So11111111111111111111111111111111111111112&outputMint=EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGk5rX2hP&amount=${amount*1e9}&slippageBps=50`
  ).then(r=>r.json());

  // 2️⃣ GET TX
  const swapTx = await fetch(
    "https://quote-api.jup.ag/v6/swap",
    {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        quoteResponse: quote,
        userPublicKey: wallet.toString(),
        wrapAndUnwrapSol:true
      })
    }
  ).then(r=>r.json());

  // 3️⃣ SIGN & SEND
  const tx = solanaWeb3.Transaction.from(
    Uint8Array.from(atob(swapTx.swapTransaction), c=>c.charCodeAt(0))
  );

  const signed = await window.solana.signTransaction(tx);
  const sig = await connection.sendRawTransaction(signed.serialize());

  alert("Swap success: " + sig);
}

// SEND
async function send(){
  alert("Use previous send logic");
}
</script>

</body>
</html>
