<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantom Clone Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#0d0d0f;
  color:white;
}

/* HEADER */
.header {
  padding:30px 20px 20px;
  background:linear-gradient(180deg,#1a3f34,#0d0d0f);
}

.wallet {
  font-size:13px;
  opacity:0.6;
}

.balance {
  font-size:42px;
  font-weight:600;
  margin-top:10px;
}

/* ACTIONS */
.actions {
  display:flex;
  justify-content:space-around;
  padding:20px;
}

.action {
  text-align:center;
}

.circle {
  width:55px;
  height:55px;
  border-radius:50%;
  background:linear-gradient(135deg,#5f2eea,#8a63ff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  margin:auto;
}

/* INPUT */
.input {
  width:90%;
  margin:5px auto;
  padding:10px;
  border-radius:10px;
  border:none;
  display:block;
}

/* TOKENS */
.tokens {
  padding:10px;
}

.token {
  display:flex;
  justify-content:space-between;
  background:#1a1a1d;
  margin:8px 12px;
  padding:14px;
  border-radius:16px;
}

.token-left {
  display:flex;
  align-items:center;
  gap:10px;
}

/* SOL LOGO */
.sol-logo {
  width:35px;
  height:35px;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:#1a1a1d;
  display:flex;
  justify-content:space-around;
  padding:12px 0;
}
</style>
</head>

<body>

<div class="header">
  <div class="wallet" onclick="connectWallet()">Tap to Connect</div>
  <div class="balance">$0.00</div>
</div>

<div class="actions">
  <div class="action">
    <div class="circle" onclick="sendSol()">⬆️</div>
    <div>Send</div>
  </div>
  <div class="action">
    <div class="circle" onclick="receive()">⬇️</div>
    <div>Receive</div>
  </div>
  <div class="action">
    <div class="circle" onclick="swap()">💱</div>
    <div>Swap</div>
  </div>
  <div class="action">
    <div class="circle" onclick="buy()">🛒</div>
    <div>Buy</div>
  </div>
</div>

<input id="to" class="input" placeholder="Address tujuan">
<input id="amount" class="input" placeholder="Jumlah SOL">

<div class="tokens" id="tokens"></div>

<div class="nav">
  <div>🏠</div>
  <div>📊</div>
  <div>🔄</div>
  <div>🌐</div>
  <div>⚙️</div>
</div>

<script>
const { Connection, PublicKey, SystemProgram, Transaction } = solanaWeb3;
const connection = new Connection("https://api.mainnet-beta.solana.com");

let wallet = null;

// CONNECT
async function connectWallet(){
  if (!window.solana){
    alert("Buka di Phantom browser");
    return;
  }

  const res = await window.solana.connect();
  wallet = res.publicKey;

  document.querySelector(".wallet").innerText =
    wallet.toString().slice(0,4)+"..."+wallet.toString().slice(-4);

  loadAll();
}

// LOAD ALL
async function loadAll(){
  loadBalance();
  loadTokens();
}

// BALANCE
async function loadBalance(){
  const lamports = await connection.getBalance(wallet);
  const sol = lamports / 1e9;

  document.querySelector(".balance").innerText =
    "$" + (sol * 100).toFixed(2); // dummy harga

  addSolToken(sol);
}

// TAMPILKAN SOL
function addSolToken(sol){
  document.getElementById("tokens").innerHTML = `
  <div class="token">
    <div class="token-left">

      <svg class="sol-logo" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00FFA3"/>
            <stop offset="100%" stop-color="#DC1FFF"/>
          </linearGradient>
        </defs>
        <rect x="15" y="20" width="70" height="12" rx="6" fill="url(#g)" transform="skewY(-10)"/>
        <rect x="15" y="44" width="70" height="12" rx="6" fill="url(#g)" transform="skewY(-10)"/>
        <rect x="15" y="68" width="70" height="12" rx="6" fill="url(#g)" transform="skewY(-10)"/>
      </svg>

      <div>
        <div>Solana</div>
        <div>${sol.toFixed(3)} SOL</div>
      </div>
    </div>
    <div>$-</div>
  </div>`;
}

// LOAD TOKEN SPL
async function loadTokens(){
  const tokens = await connection.getParsedTokenAccountsByOwner(wallet,{
    programId: new PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA")
  });

  tokens.value.forEach(t=>{
    const info = t.account.data.parsed.info;
    const amount = info.tokenAmount.uiAmount;

    if(amount > 0){
      document.getElementById("tokens").innerHTML += `
      <div class="token">
        <div class="token-left">
          <div class="sol-logo"></div>
          <div>
            <div>Token</div>
            <div>${amount}</div>
          </div>
        </div>
        <div>-</div>
      </div>`;
    }
  });
}

// SEND SOL
async function sendSol(){
  if(!wallet){
    alert("Connect dulu");
    return;
  }

  const to = document.getElementById("to").value;
  const amount = parseFloat(document.getElementById("amount").value);

  if(!to || !amount){
    alert("Isi semua");
    return;
  }

  try{
    const tx = new Transaction().add(
      SystemProgram.transfer({
        fromPubkey: wallet,
        toPubkey: new PublicKey(to),
        lamports: amount * 1e9
      })
    );

    tx.feePayer = wallet;

    let bh = await connection.getLatestBlockhash();
    tx.recentBlockhash = bh.blockhash;

    const signed = await window.solana.signTransaction(tx);
    const sig = await connection.sendRawTransaction(signed.serialize());

    alert("TX sukses:\n" + sig);

  } catch(e){
    alert("Gagal transaksi");
  }
}

// RECEIVE
function receive(){
  if(!wallet){
    alert("Connect dulu");
    return;
  }
  alert(wallet.toString());
}

// DUMMY
function swap(){ alert("Coming soon"); }
function buy(){ alert("Coming soon"); }

</script>

</body>
</html>
