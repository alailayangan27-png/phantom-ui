<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0d0d0f;
  color:white;
}

.header{
  padding:30px;
  text-align:center;
  background:linear-gradient(180deg,#1e4638,#0d0d0f);
}

.wallet{
  opacity:0.7;
  cursor:pointer;
}

.balance{
  font-size:40px;
  margin:10px;
}

.actions{
  display:flex;
  justify-content:space-around;
}

.btn{
  background:#6c4cff;
  padding:12px 20px;
  border-radius:20px;
}

.token{
  margin:10px;
  padding:15px;
  background:#1a1a1d;
  border-radius:16px;
  display:flex;
  justify-content:space-between;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:#000a;
}

.modal-content{
  position:absolute;
  bottom:0;
  width:100%;
  background:#1a1a1d;
  padding:20px;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="header">
  <div class="wallet" onclick="connect()">Connect Wallet</div>
  <div class="balance">$0.00</div>

  <div class="actions">
    <div class="btn" onclick="receive()">Deposit</div>
    <div class="btn" onclick="swap()">Swap</div>
    <div class="btn" onclick="send()">Send</div>
  </div>
</div>

<div id="tokens"></div>

<!-- DASHBOARD -->
<div style="padding:15px;">
  <h3>📊 Profit Dashboard</h3>
  <div class="token"><div>Total Volume</div><div id="vol">$0</div></div>
  <div class="token"><div>Total Fee</div><div id="fee">$0</div></div>
  <div class="token"><div>Total Transactions</div><div id="tx">0</div></div>
</div>

<!-- SWAP MODAL -->
<div id="swapModal" class="modal">
  <div class="modal-content">
    <h3>Swap</h3>

    <input id="amount" placeholder="Amount (SOL)"
      style="width:100%; padding:10px; border-radius:10px;">

    <br><br>

    <button onclick="executeSwap()" style="
      width:100%;
      padding:15px;
      background:#6c4cff;
      border:none;
      color:white;
      border-radius:20px;
    ">Execute Swap</button>

    <br><br>

    <button onclick="closeSwap()" style="
      width:100%;
      padding:10px;
      border:none;
      border-radius:20px;
    ">Cancel</button>
  </div>
</div>

<script>
const { Connection, PublicKey, SystemProgram, Transaction } = solanaWeb3;

const connection = new Connection("https://api.mainnet-beta.solana.com");

// 🔥 EDIT THIS
const FEE_ACCOUNT = "BsFAqKtJQRNJBEyfwCf8EEdMxc296JwdpraVqHPYBdYt";

let wallet = null;
let solPrice = 0;

let history = JSON.parse(localStorage.getItem("swapHistory") || "[]");

// GET SOL PRICE
async function getPrice(){
  const res = await fetch(
    "https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd"
  );
  solPrice = (await res.json()).solana.usd;
}

// CONNECT WALLET
async function connect(){
  const res = await window.solana.connect();
  wallet = res.publicKey;

  document.querySelector(".wallet").innerText =
    wallet.toString().slice(0,4) + "...";

  await getPrice();
  loadBalance();
  updateDashboard();
}

// LOAD BALANCE
async function loadBalance(){
  const lamports = await connection.getBalance(wallet);
  const sol = lamports / 1e9;
  const usd = sol * solPrice;

  document.querySelector(".balance").innerText =
    "$" + usd.toFixed(2);

  document.getElementById("tokens").innerHTML =
    `<div class="token"><div>SOL</div><div>${sol.toFixed(3)}</div></div>`;
}

// SEND SOL
async function send(){
  const to = prompt("Recipient address:");
  const amount = parseFloat(prompt("Amount (SOL):"));

  const tx = new Transaction().add(
    SystemProgram.transfer({
      fromPubkey: wallet,
      toPubkey: new PublicKey(to),
      lamports: amount * 1e9
    })
  );

  tx.feePayer = wallet;
  tx.recentBlockhash =
    (await connection.getLatestBlockhash()).blockhash;

  const signed = await window.solana.signTransaction(tx);
  const sig = await connection.sendRawTransaction(signed.serialize());

  alert("Sent: " + sig);
}

// RECEIVE
function receive(){
  alert(wallet.toString());
}

// SWAP UI
function swap(){
  document.getElementById("swapModal").style.display = "block";
}

function closeSwap(){
  document.getElementById("swapModal").style.display = "none";
}

// SAVE SWAP DATA
function saveSwap(amount){
  const fee = amount * 0.003;

  history.push({ amount, fee });

  localStorage.setItem("swapHistory", JSON.stringify(history));
  updateDashboard();
}

// UPDATE DASHBOARD
function updateDashboard(){
  let volume = 0;
  let fee = 0;

  history.forEach(h=>{
    volume += h.amount;
    fee += h.fee;
  });

  document.getElementById("vol").innerText =
    "$" + (volume * solPrice).toFixed(2);

  document.getElementById("fee").innerText =
    "$" + (fee * solPrice).toFixed(2);

  document.getElementById("tx").innerText =
    history.length;
}

// EXECUTE SWAP
async function executeSwap(){
  const amount = parseFloat(document.getElementById("amount").value);

  const quote = await fetch(
    `https://quote-api.jup.ag/v6/quote?inputMint=So11111111111111111111111111111111111111112&outputMint=EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGk5rX2hP&amount=${amount*1e9}&slippageBps=50&feeBps=30`
  ).then(r=>r.json());

  const swapTx = await fetch(
    "https://quote-api.jup.ag/v6/swap",
    {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        quoteResponse: quote,
        userPublicKey: wallet.toString(),
        wrapAndUnwrapSol: true,
        feeAccount: FEE_ACCOUNT
      })
    }
  ).then(r=>r.json());

  const tx = solanaWeb3.Transaction.from(
    Uint8Array.from(atob(swapTx.swapTransaction), c=>c.charCodeAt(0))
  );

  const signed = await window.solana.signTransaction(tx);
  const sig = await connection.sendRawTransaction(signed.serialize());

  alert("Swap success: " + sig);

  saveSwap(amount);
  closeSwap();
}
</script>

</body>
</html>
