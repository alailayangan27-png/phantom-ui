<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0d0d0f;
  color:white;
}

/* HEADER */
.header{
  padding:30px 20px;
  background:linear-gradient(180deg,#1e4638,#0d0d0f);
  text-align:center;
}

.wallet{
  font-size:14px;
  opacity:0.7;
}

.balance{
  font-size:42px;
  margin:10px 0;
}

.actions{
  display:flex;
  justify-content:space-around;
  margin-top:20px;
}

.btn{
  background:#6c4cff;
  padding:12px 20px;
  border-radius:20px;
}

/* TOKENS */
.token{
  margin:10px;
  padding:15px;
  border-radius:16px;
  background:#1a1a1d;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.token-left{
  display:flex;
  gap:10px;
  align-items:center;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1a1a1d;
  display:flex;
  justify-content:space-around;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="wallet" onclick="connect()">Connect</div>
  <div class="balance">$0.00</div>

  <div class="actions">
    <div class="btn" onclick="receive()">Deposit</div>
    <div class="btn" onclick="swap()">Swap</div>
    <div class="btn" onclick="send()">Send</div>
  </div>
</div>

<div id="tokens"></div>

<div class="nav">
  <div>💰</div>
  <div>📊</div>
  <div>🔄</div>
  <div>⚡</div>
  <div>🌐</div>
</div>

<script>
const { Connection, PublicKey, SystemProgram, Transaction } = solanaWeb3;

const connection = new Connection("https://api.mainnet-beta.solana.com");

let wallet = null;
let solPrice = 0;

// PRICE
async function getPrice(){
  const res = await fetch(
    "https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd"
  );
  const data = await res.json();
  solPrice = data.solana.usd;
}

// CONNECT
async function connect(){
  if(!window.solana){
    alert("Open in Phantom browser");
    return;
  }

  const res = await window.solana.connect();
  wallet = res.publicKey;

  document.querySelector(".wallet").innerText =
    wallet.toString().slice(0,4)+"..."+wallet.toString().slice(-4);

  await getPrice();
  loadAll();
}

// LOAD ALL
async function loadAll(){
  const lamports = await connection.getBalance(wallet);
  const sol = lamports / 1e9;
  const usd = sol * solPrice;

  document.querySelector(".balance").innerText =
    "$" + usd.toFixed(2);

  renderSol(sol, usd);
  loadTokens();
}

// SOL CARD
function renderSol(sol, usd){
  document.getElementById("tokens").innerHTML = `
  <div class="token">
    <div class="token-left">
      <div>🟣</div>
      <div>
        <div>Solana</div>
        <div>${sol.toFixed(3)} SOL</div>
      </div>
    </div>
    <div>$${usd.toFixed(2)}</div>
  </div>`;
}

// TOKEN LIST
async function loadTokens(){
  const res = await connection.getParsedTokenAccountsByOwner(
    wallet,
    { programId: new PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA") }
  );

  res.value.forEach(t=>{
    const info = t.account.data.parsed.info;
    const amount = info.tokenAmount.uiAmount;

    if(amount > 0){
      document.getElementById("tokens").innerHTML += `
      <div class="token">
        <div class="token-left">
          <div>🪙</div>
          <div>
            <div>Token</div>
            <div>${amount}</div>
          </div>
        </div>
        <div>-</div>
      </div>`;
    }
  });
}

// SEND
async function send(){
  alert("Use send logic (already working before)");
}

// RECEIVE
function receive(){
  if(!wallet){
    alert("Connect first");
    return;
  }
  alert(wallet.toString());
}

// SWAP (DEX)
async function swap(){
  alert("Swap ready, but UI dipisah biar tidak rusak");
}
</script>

</body>
</html>
