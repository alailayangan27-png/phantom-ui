<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantom Ultimate dApp</title>

<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#0d0d0f;
  color:white;
}

/* HEADER */
.header {
  padding:30px 20px;
  background:linear-gradient(180deg,#1a3f34,#0d0d0f);
}

.wallet {
  font-size:13px;
  opacity:0.6;
  cursor:pointer;
}

.balance {
  font-size:40px;
  margin-top:10px;
}

/* ACTIONS */
.actions {
  display:flex;
  justify-content:space-around;
  padding:20px;
}

.circle {
  width:55px;
  height:55px;
  border-radius:50%;
  background:linear-gradient(135deg,#5f2eea,#8a63ff);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* INPUT */
.input {
  width:90%;
  margin:5px auto;
  padding:10px;
  border-radius:10px;
  border:none;
  display:block;
}

/* TOKENS */
.token {
  background:#1a1a1d;
  margin:10px;
  padding:15px;
  border-radius:15px;
  display:flex;
  justify-content:space-between;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:#1a1a1d;
  display:flex;
  justify-content:space-around;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="wallet" onclick="connectWallet()">Tap to Connect</div>
  <div class="balance">$0.00</div>
</div>

<div class="actions">
  <div class="circle" onclick="sendSol()">⬆️</div>
  <div class="circle" onclick="sendToken()">🪙</div>
