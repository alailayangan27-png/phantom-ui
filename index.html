<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0d0d0f;
  color:white;
}

/* HEADER */
.header{
  padding:30px 20px;
  background:linear-gradient(180deg,#1e4638,#0d0d0f);
  text-align:center;
}

.wallet{
  font-size:14px;
  opacity:0.7;
  cursor:pointer;
}

.balance{
  font-size:42px;
  margin:10px 0;
}

.actions{
  display:flex;
  justify-content:space-around;
  margin-top:20px;
}

.btn{
  background:#6c4cff;
  padding:12px 20px;
  border-radius:20px;
}

/* TOKENS */
.token{
  margin:10px;
  padding:15px;
  border-radius:16px;
  background:#1a1a1d;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.token-left{
  display:flex;
  gap:10px;
  align-items:center;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1a1a1d;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:#000a;
}

.modal-content{
  position:absolute;
  bottom:0;
  width:100%;
  background:#1a1a1d;
  border-radius:20px 20px 0 0;
  padding:20px;
}
</style>
</head>

<body>

<div class="header">
  <div class="wallet" onclick="connect()">Connect</div>
  <div class="balance">$0.00</div>

  <div class="actions">
    <div class="btn" onclick="receive()">Deposit</div>
    <div class="btn" onclick="swap()">Swap</div>
    <div class="btn" onclick="send()">Send</div>
  </div>
</div>

<div id="tokens"></div>

<div class="nav">
  <div>💰</div>
  <div>📊</div>
  <div>🔄</div>
  <div>⚡</div>
  <div>🌐</div>
</div>

<!-- SWAP MODAL -->
<div id="swapModal" class="modal">
  <div class="modal-content">
    <h3>Swap</h3>

    <div>
      <div>From (SOL)</div>
      <input id="amount" type="number" placeholder="0.0"
        style="width:100%; padding:10px; border-radius:10px;">
    </div>

    <br>

    <div>
      <div>To (USDC)</div>
      <div style="opacity:0.7;">Auto</div>
    </div>

    <br>

    <button onclick="executeSwap()" style="
      width:100%;
      padding:15px;
      background:#6c4cff;
      border:none;
      border-radius:20px;
      color:white;
    ">Swap Now</button>

    <button onclick="closeSwap()" style="
      width:100%;
      padding:10px;
      margin-top:10px;
      background:#333;
      border:none;
      border-radius:20px;
      color:white;
    ">Cancel</button>
  </div>
</div>

<script>
const { Connection, PublicKey, SystemProgram, Transaction } = solanaWeb3;

const connection = new Connection("https://api.mainnet-beta.solana.com");

let wallet = null;
let solPrice = 0;

// PRICE
async function getPrice(){
  const res = await fetch(
    "https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd"
  );
  const data = await res.json();
  solPrice = data.solana.usd;
}

// CONNECT
async function connect(){
  if(!window.solana){
    alert("Open in Phantom browser");
    return;
  }

  const res = await window.solana.connect();
  wallet = res.publicKey;

  document.querySelector(".wallet").innerText =
    wallet.toString().slice(0,4)+"..."+wallet.toString().slice(-4);

  await getPrice();
  loadAll();
}

// LOAD
async function loadAll(){
  const lamports = await connection.getBalance(wallet);
  const sol = lamports / 1e9;
  const usd = sol * solPrice;

  document.querySelector(".balance").innerText =
    "$" + usd.toFixed(2);

  renderSol(sol, usd);
  loadTokens();
}

// SOL CARD
function renderSol(sol, usd){
  document.getElementById("tokens").innerHTML = `
  <div class="token">
    <div class="token-left">
      <div>🟣</div>
      <div>
        <div>Solana</div>
        <div>${sol.toFixed(3)} SOL</div>
      </div>
    </div>
    <div>$${usd.toFixed(2)}</div>
  </div>`;
}

// TOKEN LIST
async function loadTokens(){
  const res = await connection.getParsedTokenAccountsByOwner(
    wallet,
    { programId: new PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA") }
  );

  res.value.forEach(t=>{
    const info = t.account.data.parsed.info;
    const amount = info.tokenAmount.uiAmount;

    if(amount > 0){
      document.getElementById("tokens").innerHTML += `
      <div class="token">
        <div class="token-left">
          <div>🪙</div>
          <div>
            <div>Token</div>
            <div>${amount}</div>
          </div>
        </div>
        <div>-</div>
      </div>`;
    }
  });
}

// SEND
async function send(){
  if(!wallet){
    alert("Connect first");
    return;
  }

  const to = prompt("Recipient address:");
  const amount = parseFloat(prompt("Amount SOL:"));

  if(!to || !amount) return;

  try{
    const tx = new Transaction().add(
      SystemProgram.transfer({
        fromPubkey: wallet,
        toPubkey: new PublicKey(to),
        lamports: amount * 1e9
      })
    );

    tx.feePayer = wallet;
    tx.recentBlockhash =
      (await connection.getLatestBlockhash()).blockhash;

    const signed = await window.solana.signTransaction(tx);
    const sig = await connection.sendRawTransaction(signed.serialize());

    alert("✅ Sent: " + sig);

  }catch(e){
    alert("❌ Send failed");
  }
}

// RECEIVE
function receive(){
  if(!wallet){
    alert("Connect first");
    return;
  }
  alert(wallet.toString());
}

// SWAP UI
function swap(){
  if(!wallet){
    alert("Connect first");
    return;
  }
  document.getElementById("swapModal").style.display = "block";
}

function closeSwap(){
  document.getElementById("swapModal").style.display = "none";
}

// SWAP EXECUTE
async function executeSwap(){
  const amount = parseFloat(document.getElementById("amount").value);
  if(!amount) return alert("Enter amount");

  try{
    const quote = await fetch(
      `https://quote-api.jup.ag/v6/quote?inputMint=So11111111111111111111111111111111111111112&outputMint=EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGk5rX2hP&amount=${amount*1e9}&slippageBps=50`
    ).then(r=>r.json());

    const swapTx = await fetch(
      "https://quote-api.jup.ag/v6/swap",
      {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
          quoteResponse: quote,
          userPublicKey: wallet.toString(),
          wrapAndUnwrapSol:true
        })
      }
    ).then(r=>r.json());

    const tx = solanaWeb3.Transaction.from(
      Uint8Array.from(atob(swapTx.swapTransaction), c=>c.charCodeAt(0))
    );

    const signed = await window.solana.signTransaction(tx);
    const sig = await connection.sendRawTransaction(signed.serialize());

    alert("✅ Swap success: " + sig);

    closeSwap();

  }catch(e){
    alert("❌ Swap failed");
  }
}
</script>

</body>
</html>
